- name: stop the {[component]}
  ansible.builtin.service: 
    name: "{{component}}"
    state: stopped 
  tags: deployment 
  
- name: remove old code 
  ansible.builtin.file:
    path: /app 
    state: absent 
  tags: deployment 
  
